name: Deploy Pipeline

permissions:
  contents: read

on:
  workflow_run:
    workflows:
      - Backend CI (Test and Lint)
    types:
      - completed

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'develop' && github.event.workflow_run.head_repository.full_name == github.repository }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository at workflow commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Deployment placeholder
        run: echo "Add CD pipeline steps here"
